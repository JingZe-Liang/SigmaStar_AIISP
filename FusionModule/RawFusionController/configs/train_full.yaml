# 正式训练配置：在 tiny 跑通后使用。
train_list: data_catalog/train.txt
val_list: data_catalog/val.txt
save_dir: checkpoints/full_motion_aware

seed: 42
epochs: 40
batch_size: 1
val_batch_size: 1
num_workers: 0

patch_size: 512
# full-frame 验证会慢；若想每轮快一点，改成 512，最终再用 scripts/eval.py 做整图评估。
val_patch_size: 512
max_train_samples: 0
max_val_samples: 240

feature_mode: strong
model_base: 24
gn_groups: 8
init_alpha3d: 0.80

lr: 0.0002
min_lr: 0.000002
weight_decay: 0.0001
grad_clip: 1.0
amp: true

data_max_value: 4095
psnr_max_value: 4095
allow_value_clip: false
compute_ssim: true

lam_grad: 0.15
lam_tv: 0.002
lam_motion: 0.01
lam_oracle: 0.03
oracle_tau: 0.015
